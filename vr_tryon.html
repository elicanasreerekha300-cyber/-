<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR 凤钗 - 沉浸式试戴</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; user-select: none; }
        .container { position: relative; width: 100vw; height: 100vh; }

        .input_video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transform: scaleX(-1);
            z-index: 1;
            display: block;
        }

        .output_canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; cursor: grab;
            pointer-events: none;
        }
        .hud-panel { pointer-events: auto; }
        .output_canvas { pointer-events: auto; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            font-size: 14px; font-weight: 500; backdrop-filter: blur(5px);
            display: flex; align-items: center; gap: 5px; transition: all 0.3s ease;
        }
        .back-btn:hover { background: rgba(255, 76, 76, 0.3); border-color: #FF4C4C; transform: translateX(2px); }

        .hud-panel {
            position: absolute; top: 25px; right: 10px; width: 280px; max-height: 90vh;
            overflow-y: auto; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(12px);
            border-radius: 12px; padding: 8px; z-index: 10; color: white;
            display: flex; flex-direction: column; gap: 5px; border: 1px solid rgba(255,255,255,0.15);
            scrollbar-width: none;
        }
        .hud-panel::-webkit-scrollbar { display: none; }

        .panel-title { font-size: 13px; font-weight: bold; color: #ffd700; text-align: center; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
        #mode-toggle-btn { background: linear-gradient(45deg, #ffc107, #ff9800); color: black; font-weight: bold; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        #mode-toggle-btn:active { transform: scale(0.95); }
        .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 3px 0; }
        .section-title { font-size: 11px; color: #aaa; font-weight: bold; margin-top: 1px; }
        .control-group { display: flex; flex-direction: column; gap: 2px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 6px; }
        .label { font-size: 12px; color: #ddd; margin-bottom: 2px; display: flex; justify-content: space-between; }
        .val-display { color: #4fc3f7; font-family: monospace; }
        .btn-row { display: flex; gap: 3px; justify-content: space-between; }
        button.adjust-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.1); color: white; flex: 1; padding: 6px 0; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.1s; }
        button.coarse { background: rgba(255, 193, 7, 0.2); color: #ffca28; }
        button.fine { background: rgba(33, 150, 243, 0.2); color: #90caf9; }
        button:active { transform: scale(0.95); filter: brightness(1.2); }

        #loading {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 16px; z-index: 5; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
        }
        #tips {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.9); font-size: 14px; z-index: 3; pointer-events: none;
            text-shadow: 0 1px 3px black; display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="window.location.href='index.html'">⬅ Back to Shop</div>

        <video class="input_video" playsinline></video>
        <canvas class="output_canvas"></canvas>
        <div id="loading">正在初始化 AR 引擎...<br><span style="font-size:12px;color:#aaa">(首次加载可能需要几秒)</span></div>
        <div id="tips">👆 在屏幕拖动鼠标调整朝向，尝试把深度调低看看遮挡效果！</div>

        <div id="hud" class="hud-panel">
            <div class="panel-title">
                <span>🛠️ 全能控制台</span>
                <button id="mode-toggle-btn" onclick="toggleMode()">切换到 3D展示</button>
            </div>

            <div class="control-group">
                 <div class="label" style="justify-content: flex-end;">
                     <button style="width:auto; padding:2px 8px; font-size:10px; background:rgba(244,67,54,0.3)" onclick="resetParams()">💥 重置所有参数</button>
                 </div>
            </div>

            <div class="divider"></div>
            <div class="section-title">📍 位置与大小</div>

            <div class="control-group">
                <div class="label">左右平移 (X) <span id="val-x" class="val-display"></span></div>
                <div class="btn-row">
                    <button class="adjust-btn coarse" onclick="adjust('x', -0.5)">↞</button> <button class="adjust-btn fine" onclick="adjust('x', -0.05)">←</button> <button class="adjust-btn fine" onclick="adjust('x', 0.05)">→</button> <button class="adjust-btn coarse" onclick="adjust('x', 0.5)">↠</button>
                </div>
            </div>
            <div class="control-group">
                <div class="label">上下平移 (Y) <span id="val-y" class="val-display"></span></div>
                <div class="btn-row">
                    <button class="adjust-btn coarse" onclick="adjust('y', 0.5)">↟</button> <button class="adjust-btn fine" onclick="adjust('y', 0.05)">↑</button> <button class="adjust-btn fine" onclick="adjust('y', -0.05)">↓</button> <button class="adjust-btn coarse" onclick="adjust('y', -0.5)">↡</button>
                </div>
            </div>
            <div class="control-group">
                <div class="label">前后深度 (Z) <span id="val-z" class="val-display"></span></div>
                <div class="btn-row">
                    <button class="adjust-btn coarse" onclick="adjust('z', -0.5)">深插</button> <button class="adjust-btn fine" onclick="adjust('z', -0.05)">微进</button> <button class="adjust-btn fine" onclick="adjust('z', 0.05)">微出</button> <button class="adjust-btn coarse" onclick="adjust('z', 0.5)">拔出</button>
                </div>
            </div>
            <div class="control-group">
                <div class="label">凤钗大小 <span id="val-s" class="val-display"></span></div>
                <div class="btn-row">
                    <button class="adjust-btn coarse" onclick="adjustScale(-0.5)">缩小</button> <button class="adjust-btn fine" onclick="adjustScale(-0.05)">微缩</button> <button class="adjust-btn fine" onclick="adjustScale(0.05)">微大</button> <button class="adjust-btn coarse" onclick="adjustScale(0.5)">放大</button>
                </div>
            </div>

            <div class="divider"></div>
            <div class="section-title">🔄 朝向 (支持鼠标拖拽)</div>

            <div class="control-group">
                <div class="label">俯仰角度 (Rot X) <span id="val-rotX" class="val-display"></span></div>
                <div class="btn-row">
                    <button class="adjust-btn coarse" onclick="adjustRot('rotX', -0.5)">⟲ 大</button> <button class="adjust-btn fine" onclick="adjustRot('rotX', -0.1)">⟲ 微</button> <button class="adjust-btn fine" onclick="adjustRot('rotX', 0.1)">微 ⟳</button> <button class="adjust-btn coarse" onclick="adjustRot('rotX', 0.5)">大 ⟳</button>
                </div>
            </div>
            <div class="control-group">
                <div class="label">左右旋转 (Rot Y) <span id="val-rotY" class="val-display"></span></div>
                <div class="btn-row">
                    <button class="adjust-btn coarse" onclick="adjustRot('rotY', -0.5)">⟲ 大</button> <button class="adjust-btn fine" onclick="adjustRot('rotY', -0.1)">⟲ 微</button> <button class="adjust-btn fine" onclick="adjustRot('rotY', 0.1)">微 ⟳</button> <button class="adjust-btn coarse" onclick="adjustRot('rotY', 0.5)">大 ⟳</button>
                </div>
            </div>
            <div class="control-group">
                <div class="label">侧头倾斜 (Rot Z) <span id="val-rotZ" class="val-display"></span></div>
                <div class="btn-row">
                    <button class="adjust-btn coarse" onclick="adjustRot('rotZ', -0.5)">⟲ 大</button> <button class="adjust-btn fine" onclick="adjustRot('rotZ', -0.1)">⟲ 微</button> <button class="adjust-btn fine" onclick="adjustRot('rotZ', 0.1)">微 ⟳</button> <button class="adjust-btn coarse" onclick="adjustRot('rotZ', 0.5)">大 ⟳</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const FaceMesh = window.FaceMesh;
        const Camera = window.Camera;

        let isARMode = true;
        const loadingText = document.getElementById('loading');

        // --- 核心更新：根据截图调整的初始参数 ---
        const initialConfig = {
            x: 2.35,
            y: 1.35,
            z: 4.25,
            scale: 0.95,
            rotX: 0.0, rotY: 0.0, rotZ: 0.0
        };
        let config = { ...initialConfig };

        function updateDisplay() {
            document.getElementById('val-x').innerText = config.x.toFixed(2);
            document.getElementById('val-y').innerText = config.y.toFixed(2);
            document.getElementById('val-z').innerText = config.z.toFixed(2);
            document.getElementById('val-s').innerText = config.scale.toFixed(2);
            document.getElementById('val-rotX').innerText = config.rotX.toFixed(2);
            document.getElementById('val-rotY').innerText = config.rotY.toFixed(2);
            document.getElementById('val-rotZ').innerText = config.rotZ.toFixed(2);
        }

        window.adjust = (axis, delta) => { config[axis] += delta; updateDisplay(); };
        window.adjustScale = (delta) => {
            config.scale += delta; if(config.scale < 0.1) config.scale = 0.1;
            if(myModel) myModel.scale.set(config.scale, config.scale, config.scale);
            updateDisplay();
        };
        window.adjustRot = (axis, delta) => {
            config[axis] += delta;
            updateDisplay();
            if (!isARMode && modelContainer) {
                modelContainer.rotation.set(config.rotX, config.rotY, config.rotZ);
            }
        };
        window.resetParams = () => {
            config = { ...initialConfig };
            if(myModel) myModel.scale.set(config.scale, config.scale, config.scale);
            if(!isARMode && modelContainer) { modelContainer.position.set(0,0,0); modelContainer.rotation.set(0,0,0); }
            updateDisplay();
        };

        // --- 鼠标拖拽控制 ---
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        const canvasElement = document.querySelector('.output_canvas');

        canvasElement.addEventListener('mousedown', (e) => {
            if (e.target.closest('.hud-panel')) return;
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        canvasElement.addEventListener('mousemove', (e) => {
            if (!isDragging || !isARMode) return;
            const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };
            const sensitivity = 0.01;
            config.rotY += deltaMove.x * sensitivity;
            config.rotX += deltaMove.y * sensitivity;
            updateDisplay();
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        document.addEventListener('mouseup', () => { isDragging = false; });

        window.toggleMode = () => {
            isARMode = !isARMode;
            const btn = document.getElementById('mode-toggle-btn');
            const tips = document.getElementById('tips');

            if (isARMode) {
                btn.innerText = "切换到 3D展示"; btn.style.background = "linear-gradient(45deg, #ffc107, #ff9800)";
                tips.innerText = "👆 在屏幕拖动鼠标调整朝向，尝试把深度调低看看遮挡效果！";
                if (controls) controls.enabled = false;
                camera3D.position.set(0, 0, 5); camera3D.lookAt(0, 0, 0);
                if(myModel) myModel.scale.set(config.scale, config.scale, config.scale);
                if(headOccluder) headOccluder.visible = true;
            } else {
                btn.innerText = "返回 AR试戴"; btn.style.background = "linear-gradient(45deg, #2196f3, #00bcd4)";
                tips.innerText = "🖱️ 左键拖动查看 | 滚轮缩放 | 右键平移";
                if (controls) controls.enabled = true;
                if (modelContainer) {
                    modelContainer.position.set(0, 0, 0);
                    modelContainer.rotation.set(config.rotX, config.rotY, config.rotZ);
                    if(myModel) myModel.scale.set(3.0, 3.0, 3.0);
                }
                if(headOccluder) headOccluder.visible = false;
            }
        };

        updateDisplay();

        const videoElement = document.querySelector('.input_video');
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3D.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);

        const controls = new OrbitControls(camera3D, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.enabled = false;

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2); scene.add(ambientLight);
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5); dirLight1.position.set(2, 2, 5); scene.add(dirLight1);
        const backLight = new THREE.DirectionalLight(0xffffff, 1.0); backLight.position.set(-2, 2, -5); scene.add(backLight);

        let myModel = null;
        const modelContainer = new THREE.Group();
        modelContainer.renderOrder = 2;
        scene.add(modelContainer);

        const occluderGeo = new THREE.SphereGeometry(1, 32, 32);
        const occluderMat = new THREE.MeshBasicMaterial({ colorWrite: false });
        const headOccluder = new THREE.Mesh(occluderGeo, occluderMat);
        headOccluder.renderOrder = 0;
        scene.add(headOccluder);

        const loader = new GLTFLoader();
        loader.load('./flower.glb', (gltf) => {
            myModel = gltf.scene;
            myModel.scale.set(config.scale, config.scale, config.scale);
            modelContainer.add(myModel);
            modelContainer.visible = false;
            console.log("模型加载成功");
            loadingText.innerText = "模型就绪，正在启动摄像头...";
            startCamera();
        }, undefined, (error) => {
            console.error(error);
            loadingText.innerHTML = "❌ 模型加载失败<br>请检查 flower.glb 文件";
            loadingText.style.color = "#ff4c4c";
        });

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        function startCamera() {
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await faceMesh.send({image: videoElement});
                },
                width: 1280,
                height: 720
            });
            camera.start().then(() => {
                loadingText.innerText = "正在识别面部...";
            }).catch(err => {
                console.error(err);
                loadingText.innerHTML = "❌ 摄像头启动失败<br>请确保允许浏览器访问摄像头";
                loadingText.style.color = "#ff4c4c";
            });
        }

        function onResults(results) {
            if (controls.enabled) controls.update();
            renderer.clear();
            renderer.render(scene, camera3D);

            if (isARMode) {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    if(loadingText.style.display !== 'none') loadingText.style.display = 'none';
                    const landmarks = results.multiFaceLandmarks[0];

                    if (modelContainer) {
                        modelContainer.visible = true;
                        const anchor = landmarks[454];
                        const videoDepth = 5;
                        const vFOV = THREE.MathUtils.degToRad(camera3D.fov);
                        const height = 2 * Math.tan(vFOV / 2) * videoDepth;
                        const width = height * camera3D.aspect;

                        const baseX = (0.5 - anchor.x) * width;
                        const baseY = (0.5 - anchor.y) * height;
                        const baseZ = -anchor.z * width;

                        modelContainer.position.set(baseX + config.x, baseY + config.y, baseZ + config.z);

                        const leftEye = landmarks[33]; const rightEye = landmarks[263];
                        const noseTip = landmarks[1]; const midEyes = landmarks[168];

                        const dWx = (0.5 - rightEye.x) * width - (0.5 - leftEye.x) * width;
                        const dWy = (0.5 - rightEye.y) * height - (0.5 - leftEye.y) * height;

                        const baseRoll = Math.atan2(dWy, dWx);
                        const baseYaw = (noseTip.x - midEyes.x) * 3.5;
                        const basePitch = (noseTip.y - midEyes.y) * 3.5;

                        modelContainer.rotation.set(
                            basePitch + config.rotX,
                            baseYaw + config.rotY,
                            baseRoll + config.rotZ
                        );

                        const headCenter = landmarks[168];
                        const occX = (0.5 - headCenter.x) * width;
                        const occY = (0.5 - headCenter.y) * height;
                        const occZ = (-headCenter.z * width) - 1.5;

                        headOccluder.position.set(occX, occY, occZ);
                        const headScaleBase = Math.abs(dWx) * 2.2;
                        headOccluder.scale.set(headScaleBase, headScaleBase * 1.3, headScaleBase * 1.1);
                        headOccluder.rotation.set(basePitch, baseYaw, baseRoll);
                    }
                }
            } else {
                if (modelContainer && !modelContainer.visible) {
                    modelContainer.visible = true;
                    if(loadingText.style.display !== 'none') loadingText.style.display = 'none';
                }
            }
        }

        window.addEventListener('resize', () => {
            camera3D.aspect = window.innerWidth / window.innerHeight;
            camera3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
